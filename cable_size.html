<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณขนาดสาย - For_Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f3f4f6; 
        } 
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center shadow-sm">
        <div class="flex items-center gap-2 text-indigo-600 font-bold text-xl">
            <span>⚡ For_Engineer</span>
        </div>
    </header>

    <!-- Content -->
    <!-- จุดที่แก้ไขที่ 1: เปลี่ยนความกว้างจาก max-w-5xl เป็น max-w-7xl (กว้างขึ้น) หรือจะเปลี่ยนเป็น w-full ล้วนๆ เลยก็ได้ -->
    <main class="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full">
        
        <!-- ปุ่มกลับหน้าแรกและชื่อหน้า จัดให้อยู่บรรทัดเดียวกันเพื่อประหยัดพื้นที่ -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-3">
                <span class="bg-indigo-600 p-2 rounded-lg text-white text-sm">⚡</span>
                โปรแกรมคำนวณขนาดสาย
            </h1>
            
            <a href="index.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-indigo-600 font-semibold transition-colors bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 hover:shadow-md">
                ← กลับหน้าแรก
            </a>
        </div>

        <!-- จุดที่แก้ไขที่ 2: ลบกล่อง <div class="bg-white p-8..."> ออกไปเลย -->
        <!-- นำโค้ดเดิมทั้งหมดของโปรแกรมคำนวณแรงดันตกของคุณ (ตั้งแต่แท็ก container นอกสุดของเนื้อหา) มาวางต่อจากบรรทัดนี้ได้เลยครับ -->
        
        <div class="w-full">
            <!-- วางโค้ดเก่าของคุณลงตรงนี้ -->
        </div>

    </main>
</body>
</html>
